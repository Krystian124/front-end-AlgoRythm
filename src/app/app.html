<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubik Algorithms</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-theme="dark">

  <header class="header">
    <div class="logo">RubikAlgo</div>

    <nav class="nav">
      <select>
        <option value="2x2">2x2</option>
        <option value="3x3" selected>3x3</option>
        <option value="4x4">4x4</option>
      </select>

      <select>
        <option value="1 warstwa">1 warstwa</option>
        <option value="Ostatnia warstwa">Ostatnia warstwa</option>
        <option value="Całość" selected>Całość</option>
      </select>

      <!-- THEME TOGGLE -->
      <button id="themeToggle" class="theme-btn">🌙 / ☀️</button>
    </nav>
  </header>

  <main class="container">

    <!-- ALGORYTMY -->
    <section class="panel">
      <h2>Algorytmy</h2>

      <div class="grid">
        <!-- Dane z bazy danych zostaną wstawione tutaj przez script.js -->
        <div class="card">
          <h3>Ładowanie...</h3>
          <p>Łączenie z bazą danych kostka_rubika...</p>
        </div>
      </div>
    </section>

    <!-- SŁOWNIK -->
    <section class="panel">
      <h2>Słownik ruchów</h2>

      <div class="dict">
        <div class="media dict-img">
          GRAFIKA RUCHÓW KOSTKI<br>
          600x300 px (SVG / PNG)
        </div>

        <div class="dict-list">
          <div><b>R</b> – prawa ściana w górę</div>
          <div><b>R'</b> – prawa ściana w dół</div>
          <div><b>L</b> – lewa ściana</div>
          <div><b>U</b> – góra</div>
          <div><b>F</b> – przód</div>
          <div><b>B</b> – tył</div>
        </div>
      </div>
    </section>

    <!-- HERO / BANNER -->
    <section class="panel hero">
      <div class="media hero-img">
        HERO ANIMATION / ROTATING CUBE<br>
        900x400 px
      </div>
    </section>

  </main>

  <footer class="footer">
    RubikAlgo © 2026
  </footer>

  <script src="script.js"></script>
</body>

</html>
